    <title>沈惊夜 - Silk Profile</title>

    <style>
        :root {
            --panel-color: rgba(31, 36, 26, 0.85); 
            --accent-gold: #dcca87;    
            --accent-teal: #7da392;    
            --text-main: #e2e8f0;      
            --text-sub: #a2af9b;       
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', 'Noto Serif TC', sans-serif;
            /* HÌNH NỀN TOÀN TRANG: Thay 'bg-main.jpg' bằng file ảnh của bạn */
            background: linear-gradient(rgba(10, 12, 8, 0.6), rgba(10, 12, 8, 0.6)), 
                        url('https://fastcdn.hoyoverse.com/content-v2/hsr/109040/94dfb1f79cfef6722dca5d76d63e9f4a.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- GIỮ NGUYÊN: Hiệu ứng cánh hoa rơi --- */
        #flower-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99;
        }
        .flower {
            position: absolute; background-color: #ffffff;
            border-radius: 50% 0 50% 50%; opacity: 0.5;
            transform: rotate(45deg); animation: fall linear infinite;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(105vh) translateX(80px) rotate(360deg); opacity: 0; }
        }

        /* --- GIỮ NGUYÊN: Khung Layout --- */
        .wrapper { width: 100%; max-width: 750px; z-index: 10; }

        /* --- CẬP NHẬT: Banner hỗ trợ chèn ảnh nền xám --- */
        .profile-banner {
            /* THAY ĐỔI ẢNH BANNER: Thay 'banner-top.jpg' vào url dưới đây */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.alphacoders.com/131/1318491.jpeg') center/cover; 
            border-radius: 24px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(3px);
        }

        .avatar-box {
            width: 90px; height: 90px; border-radius: 50%; border: 2px solid #fff;
            overflow: hidden; flex-shrink: 0; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .banner-text h1 {
            font-family: 'Noto Serif TC', serif;
            font-weight: 400; font-size: 1.8rem;
            letter-spacing: 2px; margin-bottom: 8px; color: #ffffff;
        }

        /* CẬP NHẬT: Quote In nghiêng (Italic) */
        .banner-text p {
            font-family: 'Noto Serif TC', sans-serif;
            font-size: 0.95rem; color: var(--accent-gold);
            font-weight: 300; letter-spacing: 1px;
            font-style: italic; 
        }

        /* --- Tabs --- */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            background-color: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-sub); padding: 10px 24px; border-radius: 30px;
            cursor: pointer; font-family: inherit; font-size: 0.85rem;
            letter-spacing: 1.5px; transition: all 0.3s ease;
        }
        .tab-btn:hover, .tab-btn.active {
            color: var(--accent-gold); background-color: var(--panel-color);
            border-color: var(--accent-gold);
        }

        /* --- Content Card --- */
        .content-card {
            background-color: var(--panel-color); border-radius: 24px;
            padding: 35px; min-height: 220px; backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .tab-content { display: none; animation: fadeIn 0.4s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .silk-title {
            font-family: 'Cinzel', serif; font-weight: 300; font-size: 2.2rem;
            background: linear-gradient(135deg, var(--accent-teal) 20%, var(--accent-gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px; letter-spacing: 2px;
        }

        .bio-text { font-size: 0.95rem; color: #c2cbd4; line-height: 1.7; font-weight: 300; }

        .info-list { list-style: none; margin-top: 10px; }

            margin-bottom: 12px; font-size: 0.9rem; font-weight: 300;
