<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silk - Bio</title>
    <style>
        /* Toàn bộ màu nền được hút chính xác từ ảnh Discord của bạn */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #1b2014 0%, #0c0f0a 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #dea96c;
            overflow-x: hidden;
            position: relative;
        }

        /* Hiệu ứng hạt lấp lánh rơi phía sau nền */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Khung chứa hồ sơ mờ nhẹ theo phong cách Discord */
        .container {
            background: rgba(23, 27, 19, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(222, 169, 108, 0.1);
            padding: 35px 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.7);
            z-index: 2;
            position: relative;
        }

        /* Ảnh đại diện tròn */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid rgba(222, 169, 108, 0.2);
            object-fit: cover;
            margin-bottom: 16px;
        }

        /* Tên Silk: Đổi phông chữ có chân (serif) quý tộc và đổ màu xanh ngọc dịu giống ảnh */
        h1 {
            font-family: "Times New Roman", Times, Baskerville, Georgia, serif;
            font-size: 34px;
            margin: 0 0 2px 0;
            font-weight: 500;
            color: #72a692; /* Màu xanh ngọc chuẩn từ chữ Silk Discord */
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(114, 166, 146, 0.2);
        }

        /* Tên phụ rút gọn chỉ còn sk_77ii màu xám vàng nhạt */
        .username {
            font-size: 13.5px;
            color: #8c8675;
            margin: 0 0 24px 0;
            font-weight: 500;
        }

        /* Khung tiểu sử để trống chờ bạn điền sau */
        .bio-box {
            background: #11140e;
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            min-height: 40px; /* Tạo khoảng trống sẵn */
        }

        /* Danh sách nút bấm */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Nút bấm đồng bộ font chữ serif đậm, màu nền nâu đất #3e3829 chuẩn từ ảnh */
        .bio-link {
            font-family: "Times New Roman", Times, Baskerville, Georgia, serif;
            background: #3e3829;
            color: #f1ebd9;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 20px;
            font-weight: bold; /* Làm đậm chữ theo yêu cầu số 5 */
            font-size: 16px;
            transition: all 0.2s ease;
            border: 1px solid rgba(222, 169, 108, 0.05);
            display: block;
        }

        /* Hiệu ứng đàn hồi và sáng nhẹ khi tương tác trên màn hình cảm ứng */
        .bio-link:active {
            transform: scale(0.97);
            background: #4a4332;
            border-color: rgba(114, 166, 146, 0.4);
            color: #72a692;
        }
    </style>
</head>
<body>

    <!-- Khung chứa các hạt hiệu ứng bay -->
    <div id="particles-js"></div>

    <div class="container">
        <!-- Ảnh đại diện -->
        <img class="avatar" src="https://unsplash.com" alt="Avatar">
        
        <!-- Tên chính và tên phụ đã tinh chỉnh -->
        <h1>Silk</h1>
        <div class="username">sk_77ii</div>
        
        <!-- Khung tiểu sử hiện đang để trống sẵn cho bạn -->
        <div class="bio-box">
            <!-- Bạn có thể gõ nội dung tiểu sử vào đây bất cứ lúc nào -->
        </div>
        
        <!-- Các mục nội dung mới theo yêu cầu số 4 -->
        <div class="links-container">
            <a href="#" class="bio-link">About Me</a>
            <a href="#" class="bio-link">About Artwork & Copyright</a>
            <a href="#" class="bio-link">More</a>
        </div>
    </div>

    <!-- Nhúng thư viện tạo hiệu ứng hạt bay nhẹ nhàng -->
    <script src="https://jsdelivr.net"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#72a692" }, /* Hạt bay mang sắc xanh ngọc của Silk */
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1, "direction": "top", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onclick": { "enable": false } } },
            "retina_detect": true
        });
    </script>

</body>
</html>
