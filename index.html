<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Silk - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* CSS rút gọn để bạn dễ copy */
        :root { --panel-color: rgba(31, 36, 26, 0.85); --accent-gold: #dcca87; }
        body { 
            background: linear-gradient(rgba(10, 12, 8, 0.6), rgba(10, 12, 8, 0.6)), 
                        url('LINK_ẢNH_NỀN_CỦA_BẠN_Ở_ĐÂY') center/cover fixed; /* Thay link nền 4K tại đây */
            font-family: 'Montserrat', sans-serif; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .profile-banner { 
            background: rgba(0,0,0,0.3); border-radius: 24px; padding: 30px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; border: 1px solid #444; 
        }
        .avatar-box { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent-gold); overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .banner-text h1 { font-family: 'Cinzel', serif; font-size: 1.6rem; margin-bottom: 5px; }
        .banner-text p { font-style: italic; color: var(--accent-gold); font-size: 0.9rem; }
        .content-card { background: var(--panel-color); border-radius: 24px; padding: 30px; backdrop-filter: blur(10px); }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .silk-title { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--accent-gold); margin-bottom: 15px; }
        .info-list { list-style: none; }
        .info-list li { margin-bottom: 10px; padding-left: 20px; position: relative; font-weight: 300; }
        .info-list li::before { content: '❀'; position: absolute; left: 0; color: #fff; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="profile-banner">
            <div class="avatar-box"><img src="LINK_ẢNH_AVATAR" alt="Avatar"></div>
            <div class="banner-text">
                <h1>沈惊夜</h1>
                <p><i>我命由我不由天</i></p>
            </div>
        </div>

        <div class="nav-tabs" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button onclick="switchTab(event, 'tab-home')">HOME</button>
            <button onclick="switchTab(event, 'tab-about')">ABOUT ME</button>
            <button onclick="switchTab(event, 'tab-dni')">DNI</button>
        </div>

        <div class="content-card">
            <div id="tab-home" class="tab-content active">
                <div class="silk-title">Silk</div>
                <p>ISTJ/P • Switch • Roleplay: OC only, Single partner (looking).</p>
            </div>

            <div id="tab-about" class="tab-content">
                <div class="silk-title">About Me</div>
                <ul class="info-list">
                    <li>Signatures: sttms, sukii, sk_77ii</li>
                </ul>
            </div>

            <div id="tab-dni" class="tab-content">
                <div class="silk-title" style="color: #990000;">DNI</div>
                <ul class="info-list">
                    <li>No re-up my art.</li>
                    <li>No toxic behavior.</li>
                </ul>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="LINK_FILE_NHAC_CUA_BAN.mp3" type="audio/mpeg">
    </audio>
    <button onclick="document.getElementById('bg-music').play()" style="position:fixed; bottom:20px; right:20px; background:none; border:1px solid #fff; color:#fff; cursor:pointer;">Music ♪</button>

    <script>
        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
