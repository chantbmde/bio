<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silk - Bio Link</title>
    <style>
        /* Tông màu nền đen xám trầm theo Discord của bạn */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f120f;
            background: linear-gradient(180deg, #1b1e16 0%, #0d0f0a 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #dea96c;
        }

        /* Khung chứa bo góc mượt, màu nền nâu rêu đất trầm */
        .container {
            background: rgba(29, 33, 24, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(222, 169, 108, 0.15);
            padding: 35px 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6);
        }

        /* Ảnh đại diện tròn có viền nhẹ */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid rgba(222, 169, 108, 0.3);
            object-fit: cover;
            margin-bottom: 16px;
        }

        /* Tên hiển thị màu xanh ngọc/xanh teal nhạt chuẩn theo chữ Silk */
        h1 {
            font-size: 26px;
            margin: 0 0 4px 0;
            font-weight: 500;
            color: #7bb59f; 
            letter-spacing: -0.5px;
        }

        /* Tên phụ/Username màu xám vàng nhạt */
        .username {
            font-size: 14px;
            color: #a49e8d;
            margin: 0 0 20px 0;
        }

        /* Khung tiểu sử bo góc màu tối giống hệt Discord */
        .bio-box {
            background: rgba(18, 20, 15, 0.8);
            border-radius: 14px;
            padding: 16px;
            text-align: left;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .bio-title {
            font-size: 12px;
            font-weight: bold;
            color: #8c8675;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .bio-text {
            font-size: 14px;
            color: #cbd1c5;
            margin: 0;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Danh sách nút bấm */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Thiết kế nút bấm màu nâu đất viền vàng nhạt giống nút Chỉnh sửa hồ sơ */
        .bio-link {
            background: #3e3829;
            color: #f1ebd9;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 20px; /* Bo tròn dài giống Discord */
            font-weight: 500;
            font-size: 14.5px;
            transition: background 0.2s, transform 0.2s;
            border: 1px solid rgba(222, 169, 108, 0.1);
        }

        /* Hiệu ứng phản hồi khi chạm trên iPad */
        .bio-link:active {
            transform: scale(0.98);
            background: #4e4735;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Thay link ảnh đại diện Luocha hoặc ảnh của bạn ở đây -->
        <img class="avatar" src="https://unsplash.com" alt="Avatar">
        
        <!-- Phần tên hiển thị -->
        <h1>Silk</h1>
        <div class="username">sk_77ii • Slik</div>
        
        <!-- Khung tiểu sử mô phỏng Discord -->
        <div class="bio-box">
            <div class="bio-title">Tiểu sử</div>
            <p class="bio-text">Shu
            a Kemetic</p>
        </div>
        
        <!-- Danh sách các nút liên kết mạng xã hội -->
        <div class="links-container">
            <a href="https://facebook.com" target="_blank" class="bio-link">Facebook</a>
            <a href="https://instagram.com" target="_blank" class="bio-link">Instagram</a>
            <a href="https://tiktok.com" target="_blank" class="bio-link">TikTok</a>
        </div>
    </div>

</body>
</html>
